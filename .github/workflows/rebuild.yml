name: Rebuild Images

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  rebuild:
    name: Rebuild and push
    runs-on: ubuntu-latest
    steps:

    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Get version from latest tag
      id: version
      run: |
        TAG=$(git describe --tags --abbrev=0)
        VERSION=${TAG#v}
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "major=$(echo $VERSION | cut -d. -f1)" >> $GITHUB_OUTPUT
        echo "minor=$(echo $VERSION | cut -d. -f1-2)" >> $GITHUB_OUTPUT

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3.4.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.rebuild
        platforms: linux/amd64,linux/arm64
        push: true
        build-args: |
          VERSION=${{ steps.version.outputs.version }}
          BUILD_DATE=${{ github.event.repository.updated_at }}
          VCS_REF=${{ github.sha }}
        tags: |
          ghcr.io/liip-elearning/php-fpm_exporter:latest
          ghcr.io/liip-elearning/php-fpm_exporter:${{ steps.version.outputs.major }}
          ghcr.io/liip-elearning/php-fpm_exporter:${{ steps.version.outputs.minor }}
          ghcr.io/liip-elearning/php-fpm_exporter:${{ steps.version.outputs.version }}
